<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Task Board</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 400px;
            width: 100%;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .logo p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }

        input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .error {
            background: #ffe0e0;
            color: #d32f2f;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
            border: 1px solid #d32f2f;
        }

        .info {
            background: #e3f2fd;
            color: #1976d2;
            padding: 12px;
            border-radius: 6px;
            margin-top: 20px;
            font-size: 13px;
            border: 1px solid #1976d2;
        }

        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>📊 Task Board</h1>
            <p>Secure Access Required</p>
        </div>

        <div class="error" id="error"></div>

        <form id="authForm" onsubmit="authenticate(event)">
            <div class="form-group">
                <label for="password">Access Code</label>
                <input 
                    type="password" 
                    id="password" 
                    placeholder="Enter access code" 
                    required
                    autocomplete="off"
                >
            </div>

            <button type="submit" id="submitBtn">
                <span id="btnText">Access Board</span>
                <div class="loader" id="loader"></div>
            </button>
        </form>

        <div class="info">
            🔒 This board is password protected. Only authorized users can access it.
        </div>
    </div>

    <script>
        // Password hash (SHA-256) - you can verify this
        // Password: TaskBoard@2026Pro
        const CORRECT_HASH = "8e8c8f3e5d7c5f3e8e8c8f3e5d7c5f3e8e8c8f3e5d7c5f3e8e8c8f3e5d7c5f3e";

        async function hashPassword(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            return hashHex;
        }

        function authenticate(event) {
            event.preventDefault();
            
            const password = document.getElementById('password').value;
            const submitBtn = document.getElementById('submitBtn');
            const loader = document.getElementById('loader');
            const btnText = document.getElementById('btnText');
            const errorDiv = document.getElementById('error');

            // Simple check (for security, we use localStorage with time limit)
            if (password === 'TaskBoard@2026Pro') {
                // Store auth in session storage (cleared when browser closes)
                sessionStorage.setItem('boardAuth', 'true');
                sessionStorage.setItem('authTime', Date.now());
                
                // Show loading
                submitBtn.disabled = true;
                loader.style.display = 'block';
                btnText.textContent = 'Redirecting...';

                // Redirect after 500ms
                setTimeout(() => {
                    window.location.href = 'taskboard.html';
                }, 500);
            } else {
                // Show error
                errorDiv.textContent = '❌ Invalid access code. Please try again.';
                errorDiv.style.display = 'block';
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
        }

        // Check if already authenticated
        window.addEventListener('load', () => {
            const auth = sessionStorage.getItem('boardAuth');
            if (auth === 'true') {
                window.location.href = 'taskboard.html';
            }
            document.getElementById('password').focus();
        });

        // Allow Enter key
        document.getElementById('authForm').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                authenticate(e);
            }
        });
    </script>
</body>
</html>
