<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <script>
        // Check authentication before page loads
        if (sessionStorage.getItem('boardAuth') !== 'true') {
            window.location.href = 'index.html';
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة المهام</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: start;
        }

        .header-left h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 32px;
        }

        .logout-btn {
            padding: 10px 20px;
            background: #f0f0f0;
            color: #333;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: #e0e0e0;
            transform: translateY(-2px);
        }

        .header-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .stat {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            margin-top: 5px;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .filter-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s ease;
        }

        .filter-btn.active {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .column {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            max-height: 80vh;
        }

        .column-header {
            padding: 20px;
            background: #f8f9fa;
            border-bottom: 2px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .column-title {
            font-weight: 700;
            font-size: 16px;
            color: #333;
        }

        .column-count {
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .tasks {
            padding: 15px;
            overflow-y: auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .task {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            cursor: grab;
            transition: all 0.3s ease;
            border-left: 4px solid #667eea;
        }

        .task:hover {
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transform: translateY(-2px);
        }

        .task.high {
            border-left-color: #FF6B6B;
        }

        .task.medium {
            border-left-color: #FFA500;
        }

        .task.low {
            border-left-color: #4ECDC4;
        }

        .task-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .task-description {
            font-size: 13px;
            color: #666;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .task-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 10px;
        }

        .tag {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }

        .tag-project {
            background: #f0f0f0;
            color: #333;
        }

        .tag-type {
            background: #e3f2fd;
            color: #1976d2;
        }

        .tag-recurring {
            background: #fff3cd;
            color: #856404;
        }

        .tag-automation {
            background: #d4edda;
            color: #155724;
        }

        .task-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            padding-top: 10px;
            border-top: 1px solid #f0f0f0;
        }

        .priority-badge {
            padding: 3px 8px;
            border-radius: 3px;
            font-weight: 600;
            font-size: 11px;
        }

        .priority-high {
            background: #ffe0e0;
            color: #d32f2f;
        }

        .priority-medium {
            background: #fff3cd;
            color: #f57f17;
        }

        .priority-low {
            background: #d1f2eb;
            color: #00695c;
        }

        .assigned {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
        }

        .avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            font-size: 11px;
        }

        .avatar-user {
            background: #667eea;
        }

        .avatar-ai {
            background: #764ba2;
        }

        .due-date {
            color: #999;
        }

        .due-date.soon {
            color: #d32f2f;
            font-weight: 600;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .project-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            border-left: 4px solid;
        }

        .project-card.marketing {
            border-left-color: #FF6B6B;
        }

        .project-card.tech {
            border-left-color: #4ECDC4;
        }

        .project-card.consulting {
            border-left-color: #FFE66D;
        }

        .project-name {
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 5px;
            color: #333;
        }

        .project-description {
            font-size: 13px;
            color: #666;
            margin-bottom: 10px;
        }

        .project-count {
            font-size: 14px;
            font-weight: 600;
            color: #667eea;
        }

        @media (max-width: 768px) {
            .board {
                grid-template-columns: 1fr;
            }

            .header {
                padding: 20px;
            }

            .header h1 {
                font-size: 24px;
            }
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .sidebar {
            margin-bottom: 30px;
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        .sidebar-title {
            font-weight: 700;
            margin-bottom: 15px;
            color: #333;
        }

        .legend {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 3px;
        }

        .legend-label {
            font-size: 13px;
            color: #666;
        }

        .action-btn {
            background: none;
            border: none;
            color: #999;
            cursor: pointer;
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        .action-btn:hover {
            background: #f0f0f0;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <h1>📊 لوحة المهام</h1>
            <div class="header-stats" id="stats">
                <div class="stat">
                    <div class="stat-value">0</div>
                    <div class="stat-label">إجمالي المهام</div>
                </div>
                <div class="stat">
                    <div class="stat-value">0</div>
                    <div class="stat-label">قيد التنفيذ</div>
                </div>
                <div class="stat">
                    <div class="stat-value">0</div>
                    <div class="stat-label">أولوية عالية</div>
                </div>
                <div class="stat">
                    <div class="stat-value">0</div>
                    <div class="stat-label">متكررة</div>
                </div>
            </div>
                <div class="controls">
                    <div class="filter-group" id="filterGroup">
                        <button class="filter-btn active" data-filter="all">جميع المهام</button>
                        <button class="filter-btn" data-filter="user">مهامي</button>
                        <button class="filter-btn" data-filter="agent">مهام الذكاء الاصطناعي</button>
                        <button class="filter-btn" data-filter="high">أولوية عالية</button>
                    </div>
                </div>
            </div>
            <button class="logout-btn" onclick="logout()">🚪 تسجيل الخروج</button>
        </div>

        <!-- Projects Overview -->
        <div class="sidebar">
            <div class="sidebar-title">📁 المشاريع</div>
            <div class="projects-grid" id="projectsGrid"></div>
        </div>

        <!-- Legend -->
        <div class="sidebar">
            <div class="sidebar-title">🎨 الوسيلة التوضيحية</div>
            <div class="legend">
                <div class="legend-item">
                    <div class="legend-color" style="background: #FF6B6B;"></div>
                    <span class="legend-label">أولوية عالية</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #FFA500;"></div>
                    <span class="legend-label">أولوية متوسطة</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #4ECDC4;"></div>
                    <span class="legend-label">أولوية منخفضة</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #FFE66D;"></div>
                    <span class="legend-label">مهمة متكررة</span>
                </div>
            </div>
        </div>

        <!-- Board -->
        <div class="board" id="board"></div>
    </div>

    <script>
        // Logout function
        function logout() {
            if (confirm('هل أنت متأكد أنك تريد تسجيل الخروج؟')) {
                sessionStorage.removeItem('boardAuth');
                window.location.href = 'index.html';
            }
        }

        let allTasks = [];
        let allProjects = [];
        let currentFilter = 'all';

        // Fetch data from JSON file
        async function loadData() {
            try {
                const response = await fetch('/tasks.json');
                const data = await response.json();
                allTasks = data.tasks;
                allProjects = data.projects;
                renderBoard();
                updateStats();
                renderProjects();
            } catch (error) {
                console.error('Error loading tasks:', error);
                document.getElementById('board').innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <div class="empty-state-icon">⚠️</div>
                        <p>خطأ في تحميل بيانات المهام. يرجى التحقق من أن الخادم يعمل.</p>
                    </div>
                `;
            }
        }

        // Render the Kanban board
        function renderBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '';

            const columns = ['backlog', 'inProgress', 'review', 'done'];
            const columnNames = {
                backlog: 'المخزن المؤقت',
                inProgress: 'قيد التنفيذ',
                review: 'مراجعة',
                done: 'مكتملة'
            };

            columns.forEach(column => {
                const tasks = getFilteredTasks().filter(t => t.status === column);
                const col = document.createElement('div');
                col.className = 'column';

                const header = document.createElement('div');
                header.className = 'column-header';
                header.innerHTML = `
                    <span class="column-title">${columnNames[column]}</span>
                    <span class="column-count">${tasks.length}</span>
                `;

                const tasksContainer = document.createElement('div');
                tasksContainer.className = 'tasks';

                if (tasks.length === 0) {
                    tasksContainer.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">→</div>
                            <p style="font-size: 13px;">لا توجد مهام</p>
                        </div>
                    `;
                } else {
                    tasks.forEach(task => {
                        const taskEl = renderTask(task);
                        tasksContainer.appendChild(taskEl);
                    });
                }

                col.appendChild(header);
                col.appendChild(tasksContainer);
                board.appendChild(col);
            });
        }

        // Render individual task
        function renderTask(task) {
            const taskEl = document.createElement('div');
            taskEl.className = `task ${task.priority}`;
            taskEl.id = task.id;

            const project = allProjects.find(p => p.id === task.project);
            const dueDate = new Date(task.dueDate);
            const today = new Date();
            const daysUntil = Math.ceil((dueDate - today) / (1000 * 60 * 60 * 24));
            const isSoon = daysUntil <= 3 && daysUntil > 0;

            let tagsHtml = '';
            if (project) {
                tagsHtml += `<span class="tag tag-project">${project.name}</span>`;
            }
            tagsHtml += `<span class="tag tag-type">${task.type}</span>`;
            if (task.recurring.isRecurring) {
                tagsHtml += `<span class="tag tag-recurring">🔄 ${task.recurring.frequency}</span>`;
            }
            if (task.automationSuggestion) {
                tagsHtml += `<span class="tag tag-automation">⚡ Auto</span>`;
            }

            const dueText = daysUntil < 0 
                ? '⏰ Overdue' 
                : daysUntil === 0 
                ? '📍 Today' 
                : `📅 ${daysUntil}d`;

            taskEl.innerHTML = `
                <div class="task-title">${task.title}</div>
                <div class="task-description">${task.description}</div>
                <div class="task-meta">${tagsHtml}</div>
                <div class="task-footer">
                    <span class="priority-badge priority-${task.priority}">${task.priority.toUpperCase()}</span>
                    <div class="assigned">
                        <div class="avatar ${task.assignedTo === 'user' ? 'avatar-user' : 'avatar-ai'}">
                            ${task.assignedTo === 'user' ? '👤' : '🤖'}
                        </div>
                        <span>${task.assignedTo === 'user' ? 'You' : 'AI'}</span>
                    </div>
                    <span class="due-date ${isSoon ? 'soon' : ''}">${dueText}</span>
                </div>
            `;

            return taskEl;
        }

        // Filter tasks based on current filter
        function getFilteredTasks() {
            return allTasks.filter(task => {
                if (currentFilter === 'user') return task.assignedTo === 'user';
                if (currentFilter === 'agent') return task.assignedTo === 'agent';
                if (currentFilter === 'high') return task.priority === 'high';
                return true;
            });
        }

        // Update statistics
        function updateStats() {
            const tasks = getFilteredTasks();
            const stats = {
                total: tasks.length,
                inProgress: tasks.filter(t => t.status === 'inProgress').length,
                highPriority: tasks.filter(t => t.priority === 'high').length,
                recurring: tasks.filter(t => t.recurring.isRecurring).length
            };

            document.querySelectorAll('.stat-value').forEach((el, i) => {
                const values = [stats.total, stats.inProgress, stats.highPriority, stats.recurring];
                el.textContent = values[i];
            });
        }

        // Render projects overview
        function renderProjects() {
            const projectsGrid = document.getElementById('projectsGrid');
            projectsGrid.innerHTML = '';

            allProjects.forEach(project => {
                const taskCount = allTasks.filter(t => t.project === project.id).length;
                const card = document.createElement('div');
                
                let cardClass = 'project-card ';
                if (project.id.includes('MARKETING')) cardClass += 'marketing';
                else if (project.id.includes('TECH')) cardClass += 'tech';
                else if (project.id.includes('CONSULTING')) cardClass += 'consulting';
                
                card.className = cardClass;
                card.innerHTML = `
                    <div class="project-name">${project.name}</div>
                    <div class="project-description">${project.description}</div>
                    <div class="project-count">${taskCount} task${taskCount !== 1 ? 's' : ''}</div>
                `;
                projectsGrid.appendChild(card);
            });
        }

        // Filter button listeners
        document.getElementById('filterGroup').addEventListener('click', (e) => {
            if (e.target.classList.contains('filter-btn')) {
                document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
                e.target.classList.add('active');
                currentFilter = e.target.dataset.filter;
                renderBoard();
                updateStats();
            }
        });

        // Periodically reload data (every 5 seconds)
        setInterval(() => {
            fetch('/tasks.json')
                .then(response => response.json())
                .then(data => {
                    allTasks = data.tasks;
                    renderBoard();
                    updateStats();
                })
                .catch(err => console.error('Auto-refresh error:', err));
        }, 5000);

        // Initial load
        loadData();
    </script>
</body>
</html>
